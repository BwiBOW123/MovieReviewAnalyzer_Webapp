services:
  data-api:
    build:
      context: ./MovieReview.Api
    ports:
      - "5000:8080"

  ai:
    build:
      context: ./Backend-ai
    environment:
      AI_SERVICE_ONLY: "true"
      USE_MOCK_DATA: "true"
    ports:
      - "8001:8000"

  web:
    build:
      context: ./AI-FRONTEND
      args:
        API_BASE_URL: http://data-api:8080
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
        NEXT_PUBLIC_AI_API_BASE_URL: http://localhost:8001
    environment:
      API_BASE_URL: http://data-api:8080
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
      NEXT_PUBLIC_AI_API_BASE_URL: http://localhost:8001
    depends_on:
      - data-api
      - ai
    ports:
      - "3001:3000"
